name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "Current repo files:"
          find . -maxdepth 3 -type f | head -200

      - name: Unzip project if ZIP uploaded
        run: |
          ZIP_FILE=$(find . -maxdepth 3 -type f -iname "*.zip" | head -n 1 || true)
          if [ -n "$ZIP_FILE" ]; then
            echo "ZIP found: $ZIP_FILE"
            mkdir -p extracted_project
            unzip -q "$ZIP_FILE" -d extracted_project
            echo "ZIP extracted."
          else
            echo "No ZIP file found. Continuing..."
          fi

      - name: Find Android project
        run: |
          SETTINGS_FILE=$(find . -maxdepth 8 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1 || true)

          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::settings.gradle nahi mila. Repo me Android project files ya project ZIP upload karo."
            echo "Files found:"
            find . -maxdepth 5 -type f | head -300
            exit 1
          fi

          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "Android project found at: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StreetLens360-debug-apk
          path: "**/app/build/outputs/apk/debug/*.apk"
